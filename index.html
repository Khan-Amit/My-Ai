<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MY-AI™ Search</title>
    <style>
        /* ... (same CSS as before, no changes) ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- same HTML structure as before -->
        ...
    </div>
    <script>
        (function() {
            const queryInput = document.getElementById('queryInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsDiv = document.getElementById('results');
            const loaderDiv = document.getElementById('loader');
            const aiOverview = document.getElementById('aiOverview');
            const overviewText = document.getElementById('overviewText');
            const bestLink = document.getElementById('bestLink');
            const bestLinkUrl = document.getElementById('bestLinkUrl');
            const bestLinkDisplayUrl = document.getElementById('bestLinkDisplayUrl');
            const bestLinkSnippet = document.getElementById('bestLinkSnippet');

            // Use the JSON file in the same directory
            const JSON_FILE = 'search-response.json';

            function renderResults(data) {
                resultsDiv.innerHTML = '';
                aiOverview.classList.remove('visible');
                bestLink.classList.remove('visible');

                if (data.overview) {
                    overviewText.textContent = data.overview;
                    aiOverview.classList.add('visible');
                }

                if (data.bestLink && data.bestLink.url) {
                    bestLinkUrl.href = data.bestLink.url;
                    bestLinkUrl.textContent = data.bestLink.title || data.bestLink.url;
                    bestLinkDisplayUrl.textContent = data.bestLink.url;
                    bestLinkSnippet.textContent = data.bestLink.snippet || '';
                    bestLink.classList.add('visible');
                }

                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="info-message">😕 No results found.</div>';
                    return;
                }
                const maxResults = 36;
                const items = data.results.slice(0, maxResults);
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    let badgeHtml = '';
                    if (data.bestLink && data.bestLink.url === item.url) {
                        badgeHtml = `<div class="badge">⭐ Best</div>`;
                    } else if (item.badge) {
                        badgeHtml = `<div class="badge">${item.badge}</div>`;
                    }
                    card.innerHTML = `
                        <h3><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></h3>
                        <div class="url">${item.url}</div>
                        <div class="snippet">${item.snippet || ''}</div>
                        ${badgeHtml}
                    `;
                    resultsDiv.appendChild(card);
                });
                if (items.length < data.results.length) {
                    const more = document.createElement('div');
                    more.className = 'info-message';
                    more.textContent = `Showing first ${items.length} of ${data.results.length} results.`;
                    resultsDiv.appendChild(more);
                }
            }

            function performSearch() {
                const query = queryInput.value.trim();
                if (!query) {
                    resultsDiv.innerHTML = '<div class="info-message">✏️ Please enter a search term.</div>';
                    aiOverview.classList.remove('visible');
                    bestLink.classList.remove('visible');
                    return;
                }

                loaderDiv.style.display = 'block';
                resultsDiv.innerHTML = '';
                aiOverview.classList.remove('visible');
                bestLink.classList.remove('visible');

                // Fetch the local JSON file
                fetch(JSON_FILE)
                    .then(response => {
                        if (!response.ok) throw new Error('HTTP error ' + response.status);
                        return response.json();
                    })
                    .then(data => {
                        loaderDiv.style.display = 'none';
                        renderResults(data);
                    })
                    .catch(err => {
                        loaderDiv.style.display = 'none';
                        console.warn('Could not load JSON, using mock data:', err);
                        // Mock data (hardcoded)
                        const mock = {
                            overview: "MY‑AI is a minimalist, ternary‑based search engine that prioritises privacy and relevance. It uses a Ternary Search Tree for fast prefix queries and TF‑IDF ranking.",
                            bestLink: {
                                title: "Introducing MY‑AI: The Search Engine",
                                url: "https://my-ai.dev",
                                snippet: "A clean, ternary‑powered search engine that respects your privacy."
                            },
                            results: [
                                { title: "Introducing MY‑AI: The Search Engine", url: "https://my-ai.dev", snippet: "A clean, ternary‑powered search engine that respects your privacy.", badge: "New" },
                                { title: "C++ Ternary Search Tree Implementation", url: "https://github.com/My-Ai/tst", snippet: "Efficient memory‑savvy data structure for fast prefix queries." },
                                { title: "Philosophy of Minimalist Search", url: "https://my-ai.dev/blog", snippet: "Why less clutter leads to more meaningful discoveries." }
                            ]
                        };
                        renderResults(mock);
                    });
            }

            // Event listeners
            searchBtn.addEventListener('click', performSearch);
            queryInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            queryInput.focus();
        })();
    </script>
</body>
</html>
