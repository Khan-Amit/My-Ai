<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MY-AI™ Search</title>
    <style>
        /* === Reset & global === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a; /* deep black */
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 16px 40px;
            color: #e0e0e0;
        }
        .container {
            max-width: 720px;
            width: 100%;
        }

        /* === Header / Branding === */
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 50%;
            background: #222;
            padding: 8px;
            box-shadow: 0 0 20px rgba(192,192,192,0.1);
            /* replace src with your own logo */
            src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23c0c0c0'/%3E%3Ctext x='50' y='58' font-size='28' text-anchor='middle' fill='%230a0a0a' font-family='sans-serif' font-weight='bold'%3EMY%3C/text%3E%3C/svg%3E";
        }
        .brand h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #c0c0c0; /* silver */
            margin-top: 8px;
        }
        .brand h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
            letter-spacing: 1px;
        }
        .brand .byline {
            font-size: 0.9rem;
            color: #666;
            margin-top: 4px;
        }
        .brand .byline a {
            color: #aaa;
            text-decoration: none;
            border-bottom: 1px dotted #555;
        }
        .brand .byline a:hover {
            color: #fff;
        }

        /* === Search area === */
        .search-area {
            background: #1a1a1a;
            border-radius: 60px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            border: 1px solid #333;
            margin-bottom: 16px;
        }
        .search-area input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1.1rem;
            color: #e0e0e0;
            outline: none;
            min-width: 0;
        }
        .search-area input::placeholder {
            color: #666;
            font-style: italic;
        }
        .search-area button {
            background: #c0c0c0; /* silver */
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 1rem;
            color: #0a0a0a;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .search-area button:hover {
            background: #d8d8d8;
        }
        .search-area button:active {
            transform: scale(0.97);
        }

        /* === Geo toggle (optional) === */
        .geo-toggle {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin: 4px 0 20px;
            font-size: 0.9rem;
        }
        .geo-toggle label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #999;
            cursor: pointer;
        }
        .geo-toggle input[type="radio"] {
            accent-color: #c0c0c0;
            width: 16px;
            height: 16px;
        }
        .geo-toggle input[type="radio"]:checked + span {
            color: #f0f0f0;
            font-weight: 500;
        }

        /* === Results === */
        #results {
            margin-top: 28px;
        }
        .result-card {
            background: #c0c0c0; /* silver */
            color: #0a0a0a;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(192,192,192,0.08);
            transition: transform 0.15s;
            word-break: break-word;
        }
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(192,192,192,0.15);
        }
        .result-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .result-card h3 a {
            color: #0a0a0a;
            text-decoration: none;
        }
        .result-card h3 a:hover {
            text-decoration: underline;
        }
        .result-card .url {
            font-size: 0.8rem;
            color: #333;
            opacity: 0.7;
            margin-bottom: 4px;
            word-break: break-all;
        }
        .result-card .snippet {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #1a1a1a;
        }
        .result-card .badge {
            display: inline-block;
            background: #0a0a0a20;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #222;
            margin-top: 6px;
        }

        /* === Status / empty === */
        .info-message {
            text-align: center;
            color: #666;
            padding: 30px 0;
            font-style: italic;
        }
        .loader {
            text-align: center;
            color: #888;
            padding: 20px 0;
            display: none;
        }
        .loader .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #333;
            border-top: 3px solid #c0c0c0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* === Footer === */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: #444;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
            letter-spacing: 0.5px;
        }
        .footer a {
            color: #777;
            text-decoration: none;
        }
        .footer a:hover {
            color: #ccc;
        }

        /* Responsive tweaks */
        @media (max-width: 480px) {
            .search-area {
                border-radius: 40px;
                padding: 4px 4px 4px 16px;
            }
            .search-area input[type="text"] {
                font-size: 1rem;
                padding: 12px 0;
            }
            .search-area button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
            .brand h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header branding -->
        <div class="brand">
            <!-- Replace src with your actual logo image -->
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23c0c0c0'/%3E%3Ctext x='50' y='58' font-size='28' text-anchor='middle' fill='%230a0a0a' font-family='sans-serif' font-weight='bold'%3EMY%3C/text%3E%3C/svg%3E" alt="MY-AI logo">
            <h1>AI SEARCH ENGINE <small>MY‑AI™</small></h1>
            <div class="byline">
                Created by Seliim Ahmed &bull; All rights reserved &bull;
                <a href="mailto:amit.khanna.1082@gmail.com">amit.khanna.1082@gmail.com</a>
            </div>
        </div>

        <!-- Search input -->
        <div class="search-area">
            <input type="text" id="queryInput" placeholder="Search query…" autofocus>
            <button id="searchBtn">Search</button>
        </div>

        <!-- Geo preference -->
        <div class="geo-toggle">
            <label>
                <input type="radio" name="geo" value="global" checked>
                <span>🌍 Global</span>
            </label>
            <label>
                <input type="radio" name="geo" value="local">
                <span>📍 Local</span>
            </label>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="margin-top:8px;">Searching…</p>
        </div>

        <!-- Results container -->
        <div id="results">
            <div class="info-message">🔍 Enter a query above</div>
        </div>

        <div class="footer">
            <span>© 2026 MY‑AI — built with ternary intelligence</span>
        </div>
    </div>

    <script>
        (function() {
            const queryInput = document.getElementById('queryInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsDiv = document.getElementById('results');
            const loaderDiv = document.getElementById('loader');

            // Simulate backend endpoint – replace with your actual C++ CGI/API URL
            const API_ENDPOINT = '/search';  // e.g., http://your-server.com/search

            // Helper to build query string
            function buildQuery(query, geo) {
                const params = new URLSearchParams();
                params.append('q', query);
                params.append('geo', geo);
                return params.toString();
            }

            // Render results
            function renderResults(data) {
                // data expected: { results: [ { title, url, snippet } ] }
                resultsDiv.innerHTML = '';
                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="info-message">😕 No results found.</div>';
                    return;
                }
                // We'll show up to 36 results (as requested)
                const maxResults = 36;
                const items = data.results.slice(0, maxResults);
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <h3><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></h3>
                        <div class="url">${item.url}</div>
                        <div class="snippet">${item.snippet || ''}</div>
                        ${item.badge ? `<div class="badge">${item.badge}</div>` : ''}
                    `;
                    resultsDiv.appendChild(card);
                });
                if (items.length < data.results.length) {
                    const more = document.createElement('div');
                    more.className = 'info-message';
                    more.textContent = `Showing first ${items.length} of ${data.results.length} results.`;
                    resultsDiv.appendChild(more);
                }
            }

            // Perform search
            function performSearch() {
                const query = queryInput.value.trim();
                if (!query) {
                    resultsDiv.innerHTML = '<div class="info-message">✏️ Please enter a search term.</div>';
                    return;
                }

                // Get geo preference
                const geoRadio = document.querySelector('input[name="geo"]:checked');
                const geo = geoRadio ? geoRadio.value : 'global';

                // Show loader
                loaderDiv.style.display = 'block';
                resultsDiv.innerHTML = '';

                // Build full URL (for GET request) – you can also use POST
                const url = `${API_ENDPOINT}?${buildQuery(query, geo)}`;

                // Use fetch to call backend
                fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    loaderDiv.style.display = 'none';
                    renderResults(data);
                })
                .catch(err => {
                    loaderDiv.style.display = 'none';
                    // Fallback: if backend not ready, show mock results for demonstration
                    console.warn('Backend not reachable, using mock data:', err);
                    // MOCK DATA – remove when backend is live
                    const mock = {
                        results: [
                            { title: 'Introducing MY-AI: The Search Engine', url: 'https://my-ai.dev', snippet: 'A clean, ternary‑powered search engine that respects your privacy.', badge: 'New' },
                            { title: 'C++ Ternary Search Tree Implementation', url: 'https://github.com/My-Ai/tst', snippet: 'Efficient memory‑savvy data structure for fast prefix queries.' },
                            { title: 'Philosophy of Minimalist Search', url: 'https://my-ai.dev/blog', snippet: 'Why less clutter leads to more meaningful discoveries.' },
                        ]
                    };
                    renderResults(mock);
                });
            }

            // Event listeners
            searchBtn.addEventListener('click', performSearch);
            queryInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            // Pre‑focus
            queryInput.focus();
        })();
    </script>
</body>
</html>
